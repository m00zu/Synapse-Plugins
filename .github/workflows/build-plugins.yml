name: Build Plugin Packages

on:
  push:
    tags: ['plugins-v*']
  workflow_dispatch:
    inputs:
      build_pure_python:
        description: 'Build pure Python plugins'
        type: boolean
        default: true
      build_sam2:
        description: 'Build SAM2 plugin'
        type: boolean
        default: false
      build_rdkit:
        description: 'Build rdkit plugin'
        type: boolean
        default: false
      build_sklearn:
        description: 'Build sklearn plugin'
        type: boolean
        default: false
      tag:
        description: 'Release tag (e.g. plugins-v0.1.1)'
        type: string
        required: true

permissions:
  contents: write

jobs:
  # ── Pure Python plugins (cross-platform, build once) ────────────────────
  pure-python:
    if: github.event_name == 'push' || inputs.build_pure_python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install packaging tools
        run: pip install zstandard

      - name: Package pure Python plugins
        run: |
          mkdir -p dist
          python package_plugin.py image_analysis --slim -o dist/
          python package_plugin.py statistical_analysis --slim -o dist/
          python package_plugin.py figure_plotting --slim -o dist/
          python package_plugin.py filopodia_nodes --slim -o dist/
          python package_plugin.py volume_nodes --slim -o dist/
          python package_plugin.py data_processing --slim -o dist/
          python package_plugin.py report_nodes --slim -o dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*.synpkg

  # ── SAM2 plugin (platform-specific pip wheels) ──────────────────────────
  sam2:
    if: github.event_name == 'push' || inputs.build_sam2
    strategy:
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]
        python: ['3.13', '3.14']

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install packaging tools
        run: pip install zstandard

      - name: Install platform-specific wheels into vendor
        shell: bash
        run: |
          pip install onnxruntime --no-deps --target=sam2_nodes/vendor/
          pip install tokenizers --no-deps --target=sam2_nodes/vendor/

      - name: Package SAM2 plugin
        shell: bash
        run: mkdir -p dist && python package_plugin.py sam2_nodes -o dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*.synpkg

  # ── RDKit / Cheminformatics plugin (Rust + pip wheels) ──────────────────
  rdkit:
    if: github.event_name == 'push' || inputs.build_rdkit
    strategy:
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]
        python: ['3.13', '3.14']

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        run: pip install maturin zstandard

      # Build Rust extensions and install into vendor/
      - name: Build vina_rust
        working-directory: rdkit_nodes/rust/vina_rust
        run: maturin build --release

      - name: Install vina_rust into vendor
        shell: bash
        run: pip install $(find rdkit_nodes/rust/vina_rust/target/wheels -name '*.whl') --target=rdkit_nodes/vendor/

      - name: Build sdfrust
        working-directory: rdkit_nodes/rust/sdfrust/sdfrust-python
        run: maturin build --release

      - name: Install sdfrust into vendor
        shell: bash
        run: pip install $(find rdkit_nodes/rust/sdfrust/target/wheels -name '*.whl') --target=rdkit_nodes/vendor/

      # Download platform-specific pip wheels and extract into vendor/
      - name: Download and extract RDKit
        shell: bash
        run: |
          pip download rdkit --no-deps -d rdkit_wheels/
          python rdkit_nodes/setup_vendor.py $(find rdkit_wheels -name '*.whl')

      - name: Install onnxruntime into vendor
        shell: bash
        run: pip install onnxruntime --no-deps --target=rdkit_nodes/vendor/

      - name: Install OpenMM into vendor
        shell: bash
        run: pip install openmm --no-deps --target=rdkit_nodes/vendor/

      - name: Package RDKit plugin
        shell: bash
        run: mkdir -p dist && python package_plugin.py rdkit_nodes -o dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*.synpkg

  # ── sklearn / ML plugin (platform-specific pip wheels) ──────────────────
  sklearn:
    if: github.event_name == 'push' || inputs.build_sklearn
    strategy:
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]
        python: ['3.13', '3.14']

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install packaging tools
        run: pip install maturin zstandard

      # Build umap-rs-py (Rust UMAP + KNN) and install into vendor/
      - name: Build umap-rs-py
        working-directory: sklearn_nodes/rust/umap-rs/umap-py
        run: maturin build --release

      - name: Install umap-rs-py into vendor
        shell: bash
        run: pip install $(find sklearn_nodes/rust/umap-rs/target/wheels -name '*.whl') --target=sklearn_nodes/vendor/

      # Vendored ML packages — `--no-deps` so we don't drag a second numpy /
      # scipy / pandas into vendor/.  Those four are expected to already be
      # present in the Synapse runtime.  joblib + threadpoolctl are sklearn's
      # only required runtime deps that aren't already present.
      - name: Install scikit-learn into vendor
        shell: bash
        run: pip install scikit-learn --no-deps --target=sklearn_nodes/vendor/

      - name: Install joblib + threadpoolctl into vendor
        shell: bash
        run: |
          pip install joblib --no-deps --target=sklearn_nodes/vendor/
          pip install threadpoolctl --no-deps --target=sklearn_nodes/vendor/

      - name: Install xgboost into vendor
        shell: bash
        run: pip install xgboost --no-deps --target=sklearn_nodes/vendor/

      - name: Bundle libomp (macOS only — xgboost native lib needs it)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # macos-14 runner is arm64 with libomp from Homebrew.
          src=$(brew --prefix libomp)/lib/libomp.dylib
          test -f "$src" || { echo "libomp not found at $src"; exit 1; }
          cp "$src" sklearn_nodes/vendor/libomp.dylib

      - name: Install shap into vendor
        shell: bash
        run: pip install shap --no-deps --target=sklearn_nodes/vendor/

      - name: Install slicer into vendor (shap dependency)
        shell: bash
        run: pip install slicer --no-deps --target=sklearn_nodes/vendor/

      - name: Install cloudpickle into vendor (shap dependency)
        shell: bash
        run: pip install cloudpickle --no-deps --target=sklearn_nodes/vendor/

      - name: Package sklearn plugin
        shell: bash
        run: mkdir -p dist && python package_plugin.py sklearn_nodes -o dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*.synpkg
