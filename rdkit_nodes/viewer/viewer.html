<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="molstar.css">
<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background: #1a1a2e;
}
#viewer {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
}
/* Hide every Mol* chrome surface — we want the canvas only. */
.msp-layout-expanded .msp-layout-top,
.msp-layout-expanded .msp-layout-left,
.msp-layout-expanded .msp-layout-right,
.msp-layout-expanded .msp-layout-bottom {
    display: none !important;
}
.msp-viewport-controls { display: none !important; }
</style>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script src="molstar.js"></script>
</head>
<body>
<div id="viewer"></div>
<script>
// ── State ───────────────────────────────────────────────────────────────────
var bridge = null;
var viewer = null;
var plugin = null;
var clickMode = "disable";          // "center" | "flexible" | "disable"
var centerShapeRef = null;           // state object reference for drawCenter
var boxShapeRef = null;              // state object reference for drawBox
var flexHighlightRefs = [];          // list of state refs for highlightResidue
var proteinStructureRef = null;      // Mol* state ref for the protein structure
var ligandStructureRef = null;       // Mol* state ref for the ligand structure

// ── Shape helpers ───────────────────────────────────────────────────────────

// Draw a wireframe box shape via Mol*'s built-in BoxShape3D transform.
// Returns the state ref string so the shape can be removed later.
async function addBoxShape(bottomLeft, topRight, colorHex, radius) {
    const update = plugin.build().toRoot()
        .apply(molstar.StateTransforms.Shape.BoxShape3D, {
            bottomLeft: bottomLeft,
            topRight: topRight,
            radius: radius,
            color: molstar.Color(colorHex),
        });
    const ref = update.ref;
    update.apply(molstar.StateTransforms.Representation.ShapeRepresentation3D);
    await update.commit();
    return ref;
}

async function removeShapeRef(ref) {
    if (!ref) return;
    try {
        const r = (typeof ref === "string") ? ref : ref.ref;
        await plugin.build().delete(r).commit();
    } catch (e) {
        console.warn("[molstar] removeShapeRef failed", e);
    }
}

// ── Ready promise ───────────────────────────────────────────────────────────
// Resolves only when BOTH Mol* has initialized AND the QWebChannel bridge
// has bound. Python queues all run_js calls until this page is ready and
// Mol* has booted. The bridge resolution guards outbound calls from JS.
window.molstarReady = (async function () {
    // 1) Bridge binding
    const bridgeReady = new Promise(function (resolve) {
        if (typeof QWebChannel === "undefined" || typeof qt === "undefined") {
            resolve(null);  // Non-Qt preview (e.g. plain browser) — no bridge.
            return;
        }
        new QWebChannel(qt.webChannelTransport, function (channel) {
            bridge = channel.objects.bridge;
            resolve(bridge);
        });
    });

    // 2) Mol* viewer creation
    const container = document.getElementById("viewer");
    viewer = await molstar.Viewer.create(container, {
        layoutIsExpanded: false,
        layoutShowControls: false,
        layoutShowRemoteState: false,
        layoutShowSequence: false,
        layoutShowLog: false,
        layoutShowLeftPanel: false,
        viewportShowExpand: false,
        viewportShowSelectionMode: false,
        viewportShowAnimation: false,
        pdbProvider: "rcsb",
        emdbProvider: "rcsb",
    });
    plugin = viewer.plugin;

    // 3) Default background (matches the old #1a1a2e page background).
    try {
        plugin.canvas3d.setProps({
            renderer: { backgroundColor: molstar.Color(0x1a1a2e) },
        });
    } catch (e) {
        console.warn("[molstar] background init failed", e);
    }

    // 4) Suppress Mol*'s default focus-on-click behaviors — without this:
    //      - the clicked residue's sidechain renders as sticks
    //      - the camera zooms in to the click site
    //      - clipping planes tighten around the focus
    //    All of these clutter the docking-box UX. Three-layer suppression:
    try {
        // (a) Clear the focus state whenever anything sets it, so the
        //     structure-focus-representation behavior has nothing to render.
        plugin.managers.structure.focus.behaviors.current.subscribe(function (current) {
            if (current) {
                queueMicrotask(function () {
                    try { plugin.managers.structure.focus.clear(); } catch (e) {}
                });
            }
        });
    } catch (e) {
        console.warn("[molstar] could not install focus-clear subscriber", e);
    }
    try {
        // (b) No-op the camera focus entry points so click-to-focus can't zoom.
        if (plugin.managers && plugin.managers.camera) {
            const noop = function () { /* suppressed for docking-box UX */ };
            plugin.managers.camera.focusLoci = noop;
            plugin.managers.camera.focusSphere = noop;
        }
    } catch (e) {
        console.warn("[molstar] could not patch camera.focusLoci", e);
    }

    // 5) Click → bridge dispatch
    plugin.behaviors.interaction.click.subscribe(function (ev) {
        if (clickMode === "disable") return;
        if (!bridge) { console.warn("[molstar] click ignored — bridge not bound"); return; }
        const payload = extractAtomPayload(ev && ev.current && ev.current.loci);
        if (payload === null) return;
        try {
            bridge.onAtomClicked(JSON.stringify(payload));
        } catch (e) {
            console.error("[molstar] bridge dispatch failed", e);
        }
    });

    await bridgeReady;
    return { viewer: viewer, plugin: plugin, bridge: bridge };
})().catch(function (err) {
    console.error("[molstar] init failed", err);
    throw err;
});

// ── Exported API (stubs in this task — filled in by subsequent tasks) ──────

async function loadStructure(proteinPdb, ligandPdb) {
    await window.molstarReady;
    await plugin.clear();
    proteinStructureRef = null;
    ligandStructureRef = null;
    centerShapeRef = null;
    boxShapeRef = null;
    flexHighlightRefs = [];

    if (proteinPdb) {
        const data = await plugin.builders.data.rawData({
            data: proteinPdb, label: "protein",
        });
        const trajectory = await plugin.builders.structure.parseTrajectory(data, "pdb");
        const preset = await plugin.builders.structure.hierarchy.applyPreset(
            trajectory, "default"
        );
        proteinStructureRef = preset && preset.structure ? preset.structure : null;
    }

    if (ligandPdb) {
        const data = await plugin.builders.data.rawData({
            data: ligandPdb, label: "ligand",
        });
        const trajectory = await plugin.builders.structure.parseTrajectory(data, "pdb");
        const model = await plugin.builders.structure.createModel(trajectory);
        const structure = await plugin.builders.structure.createStructure(model);
        ligandStructureRef = structure;
        await plugin.builders.structure.representation.addRepresentation(structure, {
            type: "ball-and-stick",
            typeParams: { sizeAspectRatio: 0.5 },
        });
    }

    await molstar.PluginCommands.Camera.Reset(plugin, { durationMs: 0 });
}

async function drawCenter(x, y, z) {
    await window.molstarReady;
    await removeShapeRef(centerShapeRef);
    // Small red cube as the center marker (BoxShape3D draws a wireframe cage).
    const r = 0.4;
    centerShapeRef = await addBoxShape(
        [x - r, y - r, z - r],
        [x + r, y + r, z + r],
        0xff2222,
        0.15,
    );
}

async function drawBox(cx, cy, cz, sx, sy, sz) {
    await window.molstarReady;
    await removeShapeRef(boxShapeRef);
    const hx = sx / 2, hy = sy / 2, hz = sz / 2;
    boxShapeRef = await addBoxShape(
        [cx - hx, cy - hy, cz - hz],
        [cx + hx, cy + hy, cz + hz],
        0xffe066,
        0.15,
    );
}

async function clearShapes() {
    await window.molstarReady;
    await removeShapeRef(centerShapeRef);
    await removeShapeRef(boxShapeRef);
    centerShapeRef = null;
    boxShapeRef = null;
}

function setClickMode(mode) {
    clickMode = mode;
}

async function highlightResidue(chain, resi) {
    await window.molstarReady;
    if (!proteinStructureRef) return;
    const MS = molstar.MolScriptBuilder;
    const selection = MS.struct.generator.atomGroups({
        "chain-test":   MS.core.rel.eq([MS.struct.atomProperty.macromolecular.auth_asym_id(), String(chain)]),
        "residue-test": MS.core.rel.eq([MS.struct.atomProperty.macromolecular.auth_seq_id(),  Number(resi)]),
    });
    const update = plugin.build().to(proteinStructureRef.ref);
    const component = await update
        .apply(molstar.StateTransforms.Model.StructureComponent, {
            type: { name: "expression", params: selection },
            label: `flex-${chain}-${resi}`,
        })
        .commit();
    await plugin.builders.structure.representation.addRepresentation(component, {
        type: "ball-and-stick",
        colorTheme: { name: "uniform", params: { value: molstar.Color(0x33ffff) } },
        typeParams: { sizeAspectRatio: 0.8 },
    });
    flexHighlightRefs.push(component);
}

async function setProteinStyle(style) {
    await window.molstarReady;
    if (!proteinStructureRef) return;
    const mapping = {
        cartoon: "cartoon",
        surface: "molecular-surface",
        ribbon:  "backbone",
        line:    "line",
        stick:   "ball-and-stick",
    };
    const type = mapping[style] || "cartoon";
    await plugin.managers.structure.component.updateRepresentationsTheme(
        [proteinStructureRef], { color: "chain-id" }
    );
    await plugin.builders.structure.representation.addRepresentation(proteinStructureRef, {
        type: type,
    });
}

async function setLigandStyle(style) {
    await window.molstarReady;
    if (!ligandStructureRef) return;
    const mapping = {
        stick:          "ball-and-stick",
        ball_and_stick: "ball-and-stick",
        sphere:         "spacefill",
        line:           "line",
    };
    const type = mapping[style] || "ball-and-stick";
    await plugin.builders.structure.representation.addRepresentation(ligandStructureRef, {
        type: type,
    });
}

async function setBackground(hexColor) {
    await window.molstarReady;
    let intHex = hexColor;
    if (typeof hexColor === "string") {
        intHex = parseInt(hexColor.replace(/^#/, "").replace(/^0x/, ""), 16);
    }
    plugin.canvas3d.setProps({
        renderer: { backgroundColor: molstar.Color(intHex >>> 0) },
    });
}

async function resetView() {
    await window.molstarReady;
    await molstar.PluginCommands.Camera.Reset(plugin, { durationMs: 250 });
}

// Extract {x, y, z, chain, resn, resi, atom, elem} from a Mol* Loci.
// Returns null if the loci isn't a single-atom StructureElement pick.
function extractAtomPayload(loci) {
    if (!loci || loci.kind !== "element-loci") return null;
    if (!loci.elements || loci.elements.length === 0) return null;

    const SE = molstar.StructureElement;
    const OS = molstar.OrderedSet;

    const first = loci.elements[0];
    if (!first || !first.unit || !first.indices) return null;
    if (OS.size(first.indices) === 0) return null;

    // OrderedSet → first UnitIndex → ElementIndex in the unit's element array.
    const unitIdx = OS.getAt(first.indices, 0);
    const elementIdx = first.unit.elements[unitIdx];
    if (elementIdx === undefined) return null;

    // Read cartesian position directly from the unit's conformation.
    // Skips SE.Location.position so we don't depend on a live Location object.
    const pos = [0, 0, 0];
    first.unit.conformation.position(elementIdx, pos);

    // Residue/atom metadata via a StructureElement.Location + StructureProperties.
    // StructureProperties is split across chain/residue/atom namespaces:
    //   chain   → auth_asym_id, label_asym_id
    //   residue → auth_seq_id, label_seq_id
    //   atom    → auth_atom_id, label_atom_id, auth_comp_id, label_comp_id, type_symbol
    const location = SE.Location.create(loci.structure, first.unit, elementIdx);
    const SP = molstar.StructureProperties;
    const chain = SP.chain, residue = SP.residue, atom = SP.atom;
    const safe = (fn) => { try { return fn(location); } catch (e) { return ""; } };
    return {
        x: Number(pos[0]), y: Number(pos[1]), z: Number(pos[2]),
        chain: safe(chain.auth_asym_id) || safe(chain.label_asym_id) || "",
        resn:  safe(atom.auth_comp_id)  || safe(atom.label_comp_id)  || "",
        resi:  Number(safe(residue.auth_seq_id) || safe(residue.label_seq_id) || 0),
        atom:  safe(atom.auth_atom_id)  || safe(atom.label_atom_id)  || "",
        elem:  safe(atom.type_symbol)   || "",
    };
}
</script>
</body>
</html>
